<svg width="960" height="720" viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" style="font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:#FAFAF8">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="30" y="32" font-size="18" font-weight="600" fill="#1A1A18" letter-spacing="-0.4">Message lifecycle — database touchpoints</text>
<text x="30" y="50" font-size="11" fill="#888780" font-family="'DM Mono',monospace">Numbered sequence showing exactly when each table is written as a message flows through the platform</text>

<!-- Vertical spine -->
<line x1="70" y1="72" x2="70" y2="700" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- ══ STEP 1 ══ -->
<circle cx="70" cy="88" r="14" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="70" y="88" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#0C447C">1</text>
<text x="100" y="84" font-size="12" font-weight="500" fill="#1A1A18">Redis dedup check (fast path)</text>
<text x="100" y="100" font-size="10" fill="#888780">Ingestion service checks Redis first. HIT → reject duplicate. MISS → proceed to step 2.</text>
<rect x="560" y="74" width="140" height="30" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text x="630" y="93" text-anchor="middle" font-size="11" font-weight="500" fill="#712B13">Redis cluster</text>
<text x="708" y="93" font-size="10" fill="#888780">GET</text>
<path d="M490 90 L558 90" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- ══ STEP 2 ══ -->
<circle cx="70" cy="142" r="14" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="70" y="142" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#0C447C">2</text>
<text x="100" y="138" font-size="12" font-weight="500" fill="#1A1A18">Oracle dedup fallback (Redis miss only, ~0.1%)</text>
<text x="100" y="154" font-size="10" fill="#888780">SELECT by dedup_key → if not found: INSERT row + SET Redis key with TTL</text>
<rect x="560" y="128" width="140" height="30" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="630" y="147" text-anchor="middle" font-size="11" font-weight="500" fill="#085041">dedup_log</text>
<text x="708" y="147" font-size="10" fill="#888780">SELECT / INSERT</text>
<path d="M490 144 L558 144" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- ══ STEP 3 ══ -->
<circle cx="70" cy="198" r="14" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="70" y="198" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#0C447C">3</text>
<text x="100" y="194" font-size="12" font-weight="500" fill="#1A1A18">Validate + enrich from config</text>
<text x="100" y="210" font-size="10" fill="#888780">Read upstream_config (cached in Redis). Attach priority, channel map. Publish → processing.events</text>
<rect x="560" y="184" width="140" height="30" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="630" y="203" text-anchor="middle" font-size="11" font-weight="500" fill="#444441">upstream_config</text>
<text x="708" y="203" font-size="10" fill="#888780">READ (cached)</text>
<path d="M490 200 L558 200" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- ══ STEP 4 ══ -->
<circle cx="70" cy="272" r="14" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="70" y="272" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#085041">4</text>
<text x="100" y="256" font-size="12" font-weight="500" fill="#1A1A18">Processing — single ACID transaction (JDBC batch 500)</text>
<text x="100" y="272" font-size="10" fill="#888780">Pre → upstream processor → post pipeline, then atomic write to 3 tables in one commit</text>

<rect x="560" y="240" width="370" height="78" rx="10" fill="none" stroke="#5DCAA5" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="576" y="256" font-size="9" fill="#0F6E56" font-family="'DM Mono',monospace">BEGIN TRANSACTION</text>

<rect x="576" y="264" width="100" height="30" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="626" y="278" text-anchor="middle" font-size="10" font-weight="500" fill="#0C447C">events</text>
<text x="626" y="290" text-anchor="middle" font-size="8" fill="#5F5E5A">INSERT (no CLOB)</text>

<rect x="686" y="264" width="110" height="30" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="741" y="278" text-anchor="middle" font-size="10" font-weight="500" fill="#0C447C">event_payloads</text>
<text x="741" y="290" text-anchor="middle" font-size="8" fill="#5F5E5A">INSERT (CLOB)</text>

<rect x="806" y="264" width="110" height="30" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="861" y="278" text-anchor="middle" font-size="10" font-weight="500" fill="#0C447C">event_outbox</text>
<text x="861" y="290" text-anchor="middle" font-size="8" fill="#5F5E5A">INSERT (topic ref)</text>

<text x="576" y="310" font-size="9" fill="#0F6E56" font-family="'DM Mono',monospace">COMMIT — all 3 succeed or all roll back</text>
<path d="M490 278 L558 278" fill="none" stroke="#5DCAA5" stroke-width="0.8" marker-end="url(#a)"/>

<!-- ══ STEP 5 ══ -->
<circle cx="70" cy="350" r="14" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="70" y="350" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#085041">5</text>
<text x="100" y="346" font-size="12" font-weight="500" fill="#1A1A18">Outbox poller → Kafka dispatch topics</text>
<text x="100" y="362" font-size="10" fill="#888780">SELECT FOR UPDATE SKIP LOCKED → publish to dispatch.{ch}.{priority} → UPDATE published=true</text>
<rect x="560" y="336" width="140" height="30" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="630" y="355" text-anchor="middle" font-size="11" font-weight="500" fill="#0C447C">event_outbox</text>
<text x="708" y="355" font-size="10" fill="#888780">SELECT → UPDATE</text>
<path d="M490 352 L558 352" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- ══ STEP 6 ══ -->
<circle cx="70" cy="410" r="14" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="70" y="410" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#3C3489">6</text>
<text x="100" y="406" font-size="12" font-weight="500" fill="#1A1A18">Dispatch — call vendor API, record result</text>
<text x="100" y="422" font-size="10" fill="#888780">INSERT dispatch attempt record + UPDATE events.status → DISPATCHED or FAILED</text>
<rect x="560" y="396" width="140" height="30" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="630" y="415" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489">event_dispatches</text>
<text x="708" y="415" font-size="10" fill="#888780">INSERT</text>
<rect x="760" y="396" width="80" height="30" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="800" y="415" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489">events</text>
<text x="848" y="415" font-size="10" fill="#888780">UPDATE</text>
<path d="M490 412 L558 412" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- ══ STEP 7 ══ -->
<circle cx="70" cy="470" r="14" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
<text x="70" y="470" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#633806">7</text>
<text x="100" y="466" font-size="12" font-weight="500" fill="#1A1A18">Retry — on dispatch failure only</text>
<text x="100" y="482" font-size="10" fill="#888780">UPSERT attempt count + next_retry_at, backoff 30s → 1m → 5m. Exhausted → DLT topic</text>
<rect x="560" y="456" width="140" height="30" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
<text x="630" y="475" text-anchor="middle" font-size="11" font-weight="500" fill="#633806">event_retries</text>
<text x="708" y="475" font-size="10" fill="#888780">UPSERT</text>
<path d="M490 472 L558 472" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- ══ STEP 8 ══ -->
<circle cx="70" cy="532" r="14" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
<text x="70" y="532" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#27500A">8</text>
<text x="100" y="528" font-size="12" font-weight="500" fill="#1A1A18">Audit — full lifecycle trail</text>
<text x="100" y="544" font-size="10" fill="#888780">Every state change published to audit.events. Batch INSERT 1000/batch into Oracle.</text>
<rect x="560" y="518" width="140" height="30" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
<text x="630" y="537" text-anchor="middle" font-size="11" font-weight="500" fill="#27500A">audit_log</text>
<text x="708" y="537" font-size="10" fill="#888780">BATCH INSERT</text>
<path d="M490 534 L558 534" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- ══ STEP 9 ══ -->
<circle cx="70" cy="592" r="14" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
<text x="70" y="592" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#27500A">9</text>
<text x="100" y="588" font-size="12" font-weight="500" fill="#1A1A18">Metrics aggregation — hourly buckets</text>
<text x="100" y="604" font-size="10" fill="#888780">MERGE with atomic increment. Per upstream × channel × hour grain. Powers SLA dashboards.</text>
<rect x="560" y="578" width="190" height="30" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
<text x="655" y="597" text-anchor="middle" font-size="11" font-weight="500" fill="#27500A">upstream_metrics_hourly</text>
<text x="758" y="597" font-size="10" fill="#888780">MERGE</text>
<path d="M490 594 L558 594" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- ══ PHASE SUMMARY BAR ══ -->
<rect x="30" y="640" width="210" height="4" rx="2" fill="#85B7EB"/>
<text x="30" y="660" font-size="10" fill="#888780" font-family="'DM Mono',monospace">Steps 1–3: Ingestion</text>
<text x="30" y="674" font-size="10" fill="#B4B2A9">Minimal DB — mostly Redis</text>

<rect x="270" y="640" width="180" height="4" rx="2" fill="#5DCAA5"/>
<text x="270" y="660" font-size="10" fill="#888780" font-family="'DM Mono',monospace">Steps 4–5: Processing</text>
<text x="270" y="674" font-size="10" fill="#B4B2A9">Big atomic write (3 tables)</text>

<rect x="480" y="640" width="200" height="4" rx="2" fill="#AFA9EC"/>
<text x="480" y="660" font-size="10" fill="#888780" font-family="'DM Mono',monospace">Steps 6–7: Dispatch + retry</text>
<text x="480" y="674" font-size="10" fill="#B4B2A9">Incremental updates</text>

<rect x="710" y="640" width="160" height="4" rx="2" fill="#97C459"/>
<text x="710" y="660" font-size="10" fill="#888780" font-family="'DM Mono',monospace">Steps 8–9: Audit</text>
<text x="710" y="674" font-size="10" fill="#B4B2A9">Async, batch writes</text>

<text x="480" y="710" text-anchor="middle" font-size="10" fill="#B4B2A9" font-family="'DM Mono',monospace">Event Processing Platform · Message Lifecycle v2</text>

</svg>
